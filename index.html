<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iconic Business Registration Portal</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon">G-1</div>
                <div class="logo-text">
                    <span class="logo-name">Iconic-IFT-SDP-Group-1</span>
                    <span class="logo-tagline">Registration & Support</span>
                </div>
            </div>

            <nav class="sidebar-nav" id="sidebarNav">
                <!-- Navigation items will be injected by JS -->
            </nav>

            <div class="sidebar-help">
                <div class="help-icon">💬</div>
                <div>
                    <p class="help-title">Need Help?</p>
                    <p class="help-sub">Contact our support team anytime.</p>
                </div>
                <button class="btn-help" onclick="navigate('support',document.querySelector('[data-page=support]'))">Get Support</button>
            </div>
        </aside>

        <!-- Main content -->
        <div class="main-wrapper">
            <!-- Topbar -->
            <header class="topbar">
                <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
                <div class="topbar-spacer"></div>
                <div class="topbar-right">
                    <div class="user-profile" onclick="showUserMenu()">
                        <div class="avatar" id="userAvatar">U</div>
                        <div class="user-info">
                            <span class="user-name" id="topbarUserName">User</span>
                            <span class="user-email" id="topbarUserEmail">user@email.com</span>
                        </div>
                    </div>
                    <div class="dropdown-menu" id="userDropdown">
                        <a href="#" onclick="navigate('profile', document.querySelector('[data-page=profile]'))">My Profile</a>
                        <a href="#" onclick="handleLogout()">Logout</a>
                    </div>
                </div>
            </header>

            <!-- Page content -->
            <main class="page-content" id="page-content">
                <!-- Pages injected by JS -->
            </main>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
